- defaults:
    link:
      relink: true
      force: true

- clean: ["~", "~/.cache"]

- create:
    - ~/Developer
    - ~/.composer
    - ~/.raycast/
    - ~/Library/Application Support/Sublime Text/Packages/User/
    - ~/Library/Application Support/Rectangle/
    - ~/Library/KeyBindings

# - shell:
# - [brew tap homebrew/bundle]
# - [brew bundle]
# TODO: Install Homebrew if it doesnt exist yet
# - [/usr/bin/ruby -e "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install)", 'Install Homebrew']

- link:
    ~/.gitconfig: config/git/gitconfig
    ~/.gitattributes: config/git/gitattributes
    ~/.gitignore: config/git/gitignore
    ~/.zshrc: config/zsh/zshrc.zsh
    ~/.config/starship.toml: config/starship/starship.toml
    ~/.config/zed/settings.json: config/zed/settings.json
    ~/.config/karabiner/karabiner.json: config/karabiner/karabiner.json
    ~/.tmux.conf: config/tmux/tmux.conf
    ~/.composer/composer.json: config/composer/global-composer.json
    ~/.raycast/scripts/: config/raycast/scripts/
    ~/.claude/statusline.sh: config/claude/statusline.sh
    ~/.claude/settings.json: config/claude/settings.json
    ~/Library/Application Support/Rectangle/RectangleConfig.json: config/rectangle/RectangleConfig.json
    ~/Library/Application Support/com.mitchellh.ghostty/config: config/ghostty/config
    ~/Library/Application Support/Sublime Text/Packages/User/Themes: config/sublime-text/themes
    ~/Library/Application Support/Sublime Text/Packages/User/Snippets: config/sublime-text/snippets
    ~/Library/Application Support/Sublime Text/Packages/User/Preferences.sublime-settings: config/sublime-text/user/Preferences.sublime-settings
    ~/Library/Application Support/Sublime Text/Packages/User/Default (OSX).sublime-keymap: config/sublime-text/user/Default (OSX).sublime-keymap
    ~/Library/Application Support/Sublime Text/Packages/User/Default (OSX).sublime-mousemap: config/sublime-text/user/Default (OSX).sublime-mousemap
    ~/Library/Application Support/Sublime Text/Packages/User/Package Control.sublime-settings: config/sublime-text/user/Package Control.sublime-settings
    ~/Library/KeyBindings/DefaultKeyBinding.dict: config/mac-os/DefaultKeyBinding.dict

- shell:
    - [touch $HOME/.hushlogin]
    - [git submodule update --init --recursive]
    - [
        git clone https://github.com/jasonmccreary/git-trim.git $ZSH_CUSTOM/plugins/git-trim,
      ]
  # - [git clone https://github.com/jessarcher/zsh-artisan.git ~/.oh-my-zsh/custom/plugins/artisan]
